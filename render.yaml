# Render Blueprint — 경량 Python 서비스 (서버 LaTeX 불필요).
# TikZ는 브라우저(TikZJax)에서 렌더하므로 Docker가 필요 없습니다.
services:
  - type: web
    name: problem-restore
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL
        value: claude-opus-4-8
      - key: PYTHON_VERSION
        value: "3.12"