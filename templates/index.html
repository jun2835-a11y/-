<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문제 사진 복원기</title>
<style>
  :root { --ink:#1a1c20; --muted:#6b7280; --line:#e5e7eb; --accent:#1d4ed8; }
  * { box-sizing: border-box; }
  body { margin:0; background:#f3f4f6; color:var(--ink);
         font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
         display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px;
          padding:36px; max-width:520px; width:100%; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  h1 { font-size:20px; margin:0 0 6px; }
  p.sub { color:var(--muted); font-size:13.5px; margin:0 0 24px; line-height:1.6; }
  .drop { border:2px dashed var(--line); border-radius:10px; padding:32px; text-align:center;
          cursor:pointer; transition:border-color .15s; }
  .drop:hover { border-color:var(--accent); }
  .drop input { display:none; }
  .drop .hint { color:var(--muted); font-size:13px; margin-top:8px; }
  #name { margin-top:12px; font-size:13px; color:var(--accent); text-align:center; min-height:18px; }
  button { margin-top:20px; width:100%; padding:12px; border:none; border-radius:9px;
           background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .err { margin-top:16px; background:#fef2f2; color:#b91c1c; border:1px solid #fecaca;
         border-radius:8px; padding:10px 12px; font-size:13px; }
  .note { margin-top:20px; color:var(--muted); font-size:12px; line-height:1.6; }
</style>
</head>
<body>
  <div class="card">
    <h1>문제 사진 복원기</h1>
    <p class="sub">교과서·시험지 문제 사진을 올리면, 깨끗한 벡터 문서로 복원합니다.
      한글·수식 모두 선명하게.</p>

    <form method="post" action="/restore" enctype="multipart/form-data" id="form">
      <label class="drop" id="drop">
        <div>📷 클릭해서 문제 사진 선택</div>
        <div class="hint">JPG · PNG</div>
        <input type="file" name="photo" id="photo" accept="image/*" required>
      </label>
      <div id="name"></div>
      <button type="submit" id="btn" disabled>복원하기</button>
    </form>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <p class="note">추출(사진 이해)에만 AI를 1회 호출하고, 렌더는 브라우저·서버 로직으로
      처리합니다. 인쇄된 조판 문제는 정확도가 높고, 손글씨·복잡한 그림은 결과를 확인·보정하세요.</p>
  </div>

  <script>
    const photo = document.getElementById('photo');
    const name = document.getElementById('name');
    const btn = document.getElementById('btn');
    photo.addEventListener('change', () => {
      if (photo.files.length) { name.textContent = photo.files[0].name; btn.disabled = false; }
    });
    document.getElementById('form').addEventListener('submit', () => {
      btn.disabled = true; btn.textContent = '복원 중… (수 초)';
    });
  </script>
</body>
</html>
