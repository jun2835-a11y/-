<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<title>physlib 부품 갤러리</title>
<style>
  body { background:#fff; color:#222; font-family:sans-serif; margin:24px; }
  h1 { font-size:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
           gap:18px; }
  figure { margin:0; border:1px solid #e2e2e2; border-radius:8px; padding:10px;
            background:#fff; }
  img { width:100%; height:auto; display:block; }
  figcaption { margin-top:8px; font-size:13px; color:#555; text-align:center; }
</style></head>
<body>
  <h1>physlib 부품 갤러리 — 15개</h1>
  <div class="grid">
    <figure><img src="outputs/gallery/prim_vector.png" alt="primitive: vector"><figcaption>primitive: vector</figcaption></figure>
    <figure><img src="outputs/gallery/prim_block.png" alt="primitive: block"><figcaption>primitive: block</figcaption></figure>
    <figure><img src="outputs/gallery/prim_incline.png" alt="primitive: incline"><figcaption>primitive: incline</figcaption></figure>
    <figure><img src="outputs/gallery/prim_angle_arc.png" alt="primitive: angle_arc"><figcaption>primitive: angle_arc</figcaption></figure>
    <figure><img src="outputs/gallery/prim_spring_pulley_rope.png" alt="primitive: spring_pulley_rope"><figcaption>primitive: spring_pulley_rope</figcaption></figure>
    <figure><img src="outputs/gallery/comp_free_body_diagram.png" alt="free_body_diagram"><figcaption>free_body_diagram</figcaption></figure>
    <figure><img src="outputs/gallery/comp_pulley_simple.png" alt="pulley_simple"><figcaption>pulley_simple</figcaption></figure>
    <figure><img src="outputs/gallery/comp_incline_pulley.png" alt="incline_pulley (friction + decomp)"><figcaption>incline_pulley (friction + decomp)</figcaption></figure>
    <figure><img src="outputs/gallery/comp_spring_mass_h.png" alt="spring_mass (horizontal)"><figcaption>spring_mass (horizontal)</figcaption></figure>
    <figure><img src="outputs/gallery/comp_spring_mass_v.png" alt="spring_mass (vertical)"><figcaption>spring_mass (vertical)</figcaption></figure>
    <figure><img src="outputs/gallery/var_PHY-MEC-0101.png" alt="PHY-MEC-0101"><figcaption>PHY-MEC-0101</figcaption></figure>
    <figure><img src="outputs/gallery/var_PHY-MEC-0102.png" alt="PHY-MEC-0102"><figcaption>PHY-MEC-0102</figcaption></figure>
    <figure><img src="outputs/gallery/var_PHY-MEC-0103.png" alt="PHY-MEC-0103"><figcaption>PHY-MEC-0103</figcaption></figure>
    <figure><img src="outputs/gallery/var_PHY-MEC-0104.png" alt="PHY-MEC-0104"><figcaption>PHY-MEC-0104</figcaption></figure>
    <figure><img src="outputs/gallery/var_PHY-MEC-0105.png" alt="PHY-MEC-0105"><figcaption>PHY-MEC-0105</figcaption></figure>
  </div>
</body></html>
